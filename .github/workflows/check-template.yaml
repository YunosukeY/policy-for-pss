name: check up-to-date
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  check-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: aquaproj/aqua-installer@v4.0.5
        with:
          aqua_version: v2.62.1
      - run: |
          ./script/konstraint.sh create . -o k8s
          opa build -b .
          git diff --quiet
