name: opa
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  opa-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: aquaproj/aqua-installer@v4.0.4
        with:
          aqua_version: v2.60.0
      - run: opa test pod-security-standards
